worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uhs=$upstream_header_time urt=$upstream_response_time '
                    'corr=$http_x_request_id';

    access_log /var/log/nginx/access.log main;

    send_file on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript application/wasm;

    # ─── Rate Limiting ────────────────────────────────────────────────────
    # Shared zone for general requests (backup to NestJS CustomThrottlerGuard)
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # Zone for telemetry ingest (per IP — NestJS throttles by device JWT sub)
    limit_req_zone $binary_remote_addr zone=telemetry:10m rate=100r/s;

    # Zone for auth endpoints (prevent brute force)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ─── Upstream Backend ──────────────────────────────────────────────────
    upstream eldercare_backend {
        least_conn;
        server backend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream eldercare_web {
        least_conn;
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ─── Server Block (HTTP → HTTPS redirect) ─────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── Server Block (HTTPS) ──────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── SSL (Let's Encrypt will populate these) ──
        ssl_certificate /etc/letsencrypt/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/ca.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS (optional — uncomment after confirming HTTPS works)
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Proxy Headers ──
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header Connection "";

        # ── Timeouts (match NestJS ThrottlerGuard tiers) ──
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # ── Buffering ──
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # ── Health Check Endpoint (no rate limit) ──
        location = /v1/health {
            proxy_pass http://eldercare_backend;
            proxy_set_header X-Forwarded-For $remote_addr;
            limit_req off;
            access_log off;
        }

        location = /v1/health/ready {
            proxy_pass http://eldercare_backend;
            proxy_set_header X-Forwarded-For $remote_addr;
            limit_req off;
            access_log off;
        }

        # ── Auth Endpoints (strict rate limit) ──
        location ~ ^/v1/auth/(login|register|refresh)$ {
            proxy_pass http://eldercare_backend;
            limit_req zone=auth burst=10 nodelay;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # ── Telemetry Ingest (high throughput) ──
        location ~ ^/v1/elder/telemetry$ {
            proxy_pass http://eldercare_backend;
            limit_req zone=telemetry burst=200 nodelay;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_request_buffering off;
        }

        # ── WebSocket (live vitals / future) ──
        location /v1/ws {
            proxy_pass http://eldercare_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-For $remote_addr;
            limit_req off;
            proxy_read_timeout 86400s;
        }

        # ── Default API Proxy ──
        location /v1/ {
            proxy_pass http://eldercare_backend;
            limit_req zone=general burst=50 nodelay;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # ── Static Files (web dashboard — standalone output) ──
        location / {
            proxy_pass http://eldercare_web;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 60s;
            gzip_static on;
        }

        # ── Error Pages ──
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
